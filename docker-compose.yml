name: acg-master

services:
  redis: 
    image: redis:8.0.3
    container_name: acg-master_redis
    restart: always
    ports:
      - "${REDIS_EXPOSE_PORT}"
    volumes:
      - ${DOCKER_PATH}/redis/data:/data

  app:
    build: . 
    container_name: acg-master_app
    restart: always
    depends_on:
      - redis 
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - FRONTEND_URL=${FRONTEND_URL}
      - HOST=0.0.0.0
      - PORT=${PORT}
      - REDIS_URL=redis://acg-master_redis:6379
      - LEPTOS_SITE_ROOT=/app/site
      - LEPTOS_SITE_ADDR=0.0.0.0:${PORT}

  nginx:
    image: nginx:alpine
    container_name: acg-master_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
